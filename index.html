<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#170f30">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MVS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MVS · My Voice Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#2b1a52; --bg-2:#170f30; --stage:#1f1442;
    --gold:#ffc857; --gold-soft:#ffe2a0;
    --air:#ff3b5c; --air-glow:rgba(255,59,92,.55);
    --pink:#ff9ecd; --cream:#fff8f0; --muted:#b6a8d6;
    --card:rgba(255,255,255,.06); --line:rgba(255,255,255,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Gowun Dodum',system-ui,sans-serif;
    color:var(--cream);
    background:
      radial-gradient(900px 500px at 50% -8%, rgba(255,200,87,.18), transparent 60%),
      linear-gradient(160deg,var(--bg-1),var(--bg-2));
    background-attachment:fixed;
    min-height:100%;
    overflow-x:hidden;
    -webkit-user-select:none;user-select:none;
  }
  .display{font-family:'Jua',sans-serif}

  .wrap{
    max-width:760px;margin:0 auto;
    padding:calc(20px + env(safe-area-inset-top)) 18px calc(60px + env(safe-area-inset-bottom));
  }

  /* header */
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{font-size:30px;filter:drop-shadow(0 4px 10px rgba(255,200,87,.4))}
  .title{font-family:'Jua',sans-serif;font-size:23px;line-height:1.1}
  .title small{display:block;font-family:'Gowun Dodum';font-size:12.5px;color:var(--muted);margin-top:3px}
  #nameEdit{
    background:none;border:none;color:var(--gold-soft);font:inherit;font-family:'Gowun Dodum';
    font-size:12.5px;border-bottom:1px dashed transparent;cursor:text;width:34px;text-align:center;
  }
  #nameEdit:hover{border-bottom-color:var(--line)}
  #nameEdit:focus{outline:none;border-bottom-color:var(--gold)}

  /* on air */
  .onair{
    display:inline-flex;align-items:center;gap:9px;
    padding:8px 16px;border-radius:999px;border:1.5px solid var(--line);
    font-family:'Jua',sans-serif;letter-spacing:1px;font-size:14px;color:var(--muted);
    transition:.25s;
  }
  .onair .dot{width:11px;height:11px;border-radius:50%;background:var(--muted);transition:.25s}
  body.live .onair{color:#fff;border-color:var(--air);background:rgba(255,59,92,.12);box-shadow:0 0 22px var(--air-glow)}
  body.live .onair .dot{background:var(--air);box-shadow:0 0 12px var(--air);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.25}}

  /* stage */
  .stage{
    position:relative;background:var(--stage);border:1px solid var(--line);border-radius:24px;
    padding:26px 24px 30px;overflow:hidden;transition:.3s;
  }
  .spot{
    position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .4s;
    background:radial-gradient(420px 320px at 50% 18%, rgba(255,200,87,.22), transparent 65%);
  }
  body.live .spot{opacity:1}
  body.live .stage{border-color:rgba(255,200,87,.35)}

  .mission{
    display:inline-flex;align-items:center;gap:8px;background:rgba(255,158,205,.14);
    border:1px solid rgba(255,158,205,.35);color:var(--pink);
    padding:7px 14px;border-radius:999px;font-size:14px;margin-bottom:16px;cursor:pointer;user-select:none;
    transition:.2s;
  }
  .mission:hover{background:rgba(255,158,205,.24)}
  .mission b{font-family:'Jua',sans-serif;color:#ffd0e6;font-weight:400}

  .script{
    width:100%;min-height:118px;resize:vertical;background:rgba(0,0,0,.18);
    border:1px solid var(--line);border-radius:16px;padding:18px 20px;
    color:var(--cream);font-family:'Gowun Dodum';font-size:21px;line-height:1.65;
    text-align:center;-webkit-user-select:text;user-select:text;
  }
  #nameEdit{-webkit-user-select:text;user-select:text}
  .script:focus{outline:none;border-color:var(--gold)}
  .script::placeholder{color:var(--muted)}

  .scriptbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0 4px}
  .chip{
    background:var(--card);border:1px solid var(--line);color:var(--muted);
    padding:7px 13px;border-radius:999px;font-size:13px;cursor:pointer;transition:.2s;font-family:'Gowun Dodum'
  }
  .chip:hover{color:var(--cream);border-color:var(--gold);background:rgba(255,200,87,.1)}

  /* recorder */
  .recorder{display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:24px;position:relative}
  canvas{width:100%;max-width:420px;height:64px;display:block}
  .timer{font-family:'Jua',sans-serif;font-size:30px;letter-spacing:2px;color:var(--gold-soft);min-height:36px}
  .recbtn{
    width:96px;height:96px;border-radius:50%;border:none;cursor:pointer;position:relative;
    background:radial-gradient(circle at 50% 38%, #ff6b81, var(--air));
    box-shadow:0 10px 30px var(--air-glow),inset 0 2px 6px rgba(255,255,255,.4);
    display:flex;align-items:center;justify-content:center;font-size:38px;transition:transform .12s;
  }
  .recbtn:hover{transform:scale(1.05)}
  .recbtn:active{transform:scale(.96)}
  body.live .recbtn{background:radial-gradient(circle at 50% 38%,#fff,#ffd1d9);
    box-shadow:0 0 0 8px rgba(255,59,92,.22),0 10px 30px var(--air-glow)}
  body.live .recbtn::after{content:"";width:30px;height:30px;border-radius:7px;background:var(--air)}
  body.live .recbtn span{display:none}
  .hint{font-size:13.5px;color:var(--muted);text-align:center;min-height:18px}

  /* takes */
  .takes{margin-top:34px}
  .takes h2{font-family:'Jua',sans-serif;font-size:18px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .takes .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  .empty{
    text-align:center;color:var(--muted);font-size:14.5px;padding:30px 16px;border:1px dashed var(--line);
    border-radius:16px;line-height:1.7
  }
  .take{
    display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:13px 15px;margin-bottom:11px;transition:.2s;
  }
  .take.best{border-color:var(--gold);background:rgba(255,200,87,.1)}
  .take .no{font-family:'Jua',sans-serif;font-size:15px;color:var(--gold-soft);min-width:58px}
  .take .meta{flex:1;min-width:0}
  .take .meta .top{font-size:14.5px;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .take .meta .bot{font-size:12px;color:var(--muted);margin-top:3px}
  .take audio{height:34px}
  .iconbtn{
    background:none;border:1px solid var(--line);color:var(--muted);width:36px;height:36px;
    border-radius:10px;cursor:pointer;font-size:16px;transition:.2s;flex-shrink:0
  }
  .iconbtn:hover{color:var(--cream);border-color:var(--gold)}
  .iconbtn.star.on{color:var(--gold);border-color:var(--gold)}
  .take-actions{display:flex;gap:7px;flex-shrink:0}

  /* toast */
  #toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:rgba(40,25,75,.96);border:1px solid var(--gold);color:var(--cream);
    padding:13px 22px;border-radius:14px;font-family:'Jua',sans-serif;font-size:15px;
    opacity:0;pointer-events:none;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:50
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:520px){
    .title,#nameEdit{font-size:19px}
    .script{font-size:18px}
    .recbtn{width:84px;height:84px;font-size:32px}
    .take audio{width:120px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="logo">🎙️</div>
      <div class="title">
        MVS
        <small><input id="nameEdit" value="나의" maxlength="10" title="이름을 바꿔보세요" />의 보이스 스튜디오</small>
      </div>
    </div>
    <div class="onair"><span class="dot"></span>ON AIR</div>
  </header>

  <section class="stage">
    <div class="spot"></div>

    <div class="mission" id="mission" title="눌러서 새로운 미션 받기">
      🎭 오늘의 연기 미션 · <b id="missionText">밝고 신나게</b>
    </div>

    <textarea class="script" id="script" placeholder="여기에 연습할 대사를 적어보세요.
아래 버튼으로 예시 대본을 불러올 수도 있어요!"></textarea>

    <div class="scriptbar">
      <button class="chip" data-cat="anime">✨ 애니메이션 대사</button>
      <button class="chip" data-cat="narration">📖 동화 낭독</button>
      <button class="chip" data-cat="ad">📺 광고 나레이션</button>
      <button class="chip" data-cat="emotion">💗 감정 연기</button>
    </div>

    <div class="recorder">
      <canvas id="wave" width="840" height="128"></canvas>
      <div class="timer" id="timer">0:00</div>
      <button class="recbtn" id="recbtn" title="녹음 시작 / 정지"><span>🎤</span></button>
      <div class="hint" id="hint">버튼을 누르면 녹음이 시작돼요</div>
    </div>
  </section>

  <section class="takes">
    <h2>🎬 내 녹음 모음 <span id="takeCount" style="font-size:13px;color:var(--muted);font-family:'Gowun Dodum'"></span></h2>
    <div class="sub">여러 번 녹음하고 다시 들어보세요. ⭐ 별을 눌러 베스트 테이크를 골라보고, 📤 로 친구나 선생님에게 보낼 수 있어요.</div>
    <div id="takeList"><div class="empty">아직 녹음이 없어요.<br>위에서 첫 녹음을 시작해보세요! 🌟</div></div>
  </section>

</div>
<div id="toast"></div>

<script>
const $ = s => document.querySelector(s);

/* ---------- 예시 대본 & 미션 ---------- */
const SCRIPTS = {
  anime: [
    "포기하지 마! 우리가 함께라면 못 할 게 없어. 자, 일어나서 다시 한번 도전하는 거야!",
    "뭐…뭐라고? 그게 정말이야? 믿을 수 없어… 하지만 네가 그렇게 말한다면, 난 너를 믿을게.",
    "드디어 찾았다, 전설의 보물! 이걸로 우리 마을을 구할 수 있어. 모두들, 서두르자!"
  ],
  narration: [
    "옛날 옛적, 깊은 숲속에 작은 여우 한 마리가 살고 있었어요. 여우는 매일 밤 별을 바라보며 꿈을 꾸었답니다.",
    "아침 햇살이 창문으로 살며시 들어왔어요. 토끼는 기지개를 켜며 말했어요. \"오늘은 어떤 멋진 일이 일어날까?\"",
    "바닷가 마을에 바람이 불어왔어요. 파도는 철썩철썩, 갈매기는 끼룩끼룩. 모두가 새로운 하루를 맞이했지요."
  ],
  ad: [
    "촉촉하고 부드러운 한 입. 오늘 하루의 작은 행복, 지금 만나보세요.",
    "더 빠르게, 더 가볍게. 당신의 일상을 바꾸는 단 하나의 선택.",
    "온 가족이 함께하는 시간. 따뜻한 마음을 담아 전합니다."
  ],
  emotion: [
    "(슬프게) 가지 마… 조금만 더 내 곁에 있어 주면 안 될까? 이렇게 헤어지는 건 너무 아쉬워.",
    "(화내며) 어떻게 나한테 이럴 수 있어! 난 정말 너를 믿었단 말이야!",
    "(속삭이듯) 쉿… 조용히 해. 저기 봐, 아무도 우리를 눈치채지 못하게 살금살금 가는 거야."
  ]
};
const MISSIONS = [
  "밝고 신나게","슬프고 애절하게","화가 잔뜩 나서","속삭이듯 조용히",
  "잔뜩 겁먹은 목소리로","아주 진지하게","장난스럽고 귀엽게","당당하고 씩씩하게",
  "졸린 목소리로","감동에 벅차서","비밀을 말하듯이","아주 빠르고 급하게"
];

let pick = {};
function nextScript(cat){
  pick[cat] = ((pick[cat] ?? -1) + 1) % SCRIPTS[cat].length;
  $('#script').value = SCRIPTS[cat][pick[cat]];
}
document.querySelectorAll('.chip').forEach(c =>
  c.onclick = () => nextScript(c.dataset.cat));

let mi = 0;
$('#mission').onclick = () => {
  mi = (mi + 1) % MISSIONS.length;
  $('#missionText').textContent = MISSIONS[mi];
};

/* ---------- 토스트 ---------- */
let toastT;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'),1900);
}

/* ---------- 녹음 ---------- */
let mediaRecorder, chunks=[], stream, audioCtx, analyser, rafId, startTime, timerId;
let takeNo = 0;
const takes = []; // {id,no,url,blob,script,mission,dur,best}

/* ---------- IndexedDB 영구 저장 ---------- */
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open('voiceStudio', 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains('takes')) d.createObjectStore('takes',{keyPath:'id'});
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror = e => rej(e);
  });
}
function dbPut(rec){
  if(!db) return;
  const tx = db.transaction('takes','readwrite');
  tx.objectStore('takes').put({id:rec.id,no:rec.no,blob:rec.blob,script:rec.script,mission:rec.mission,dur:rec.dur,best:rec.best});
}
function dbDelete(id){
  if(!db) return;
  db.transaction('takes','readwrite').objectStore('takes').delete(id);
}
async function loadTakes(){
  try{ await openDB(); }catch(e){ return; }
  const tx = db.transaction('takes','readonly');
  const req = tx.objectStore('takes').getAll();
  req.onsuccess = () => {
    const saved = req.result.sort((a,b)=>a.id-b.id);
    saved.forEach(s=>{
      const url = URL.createObjectURL(s.blob);
      takes.unshift({...s, url});
      takeNo = Math.max(takeNo, s.no);
    });
    renderTakes();
  };
}

const recbtn = $('#recbtn');
recbtn.onclick = () => mediaRecorder && mediaRecorder.state === 'recording' ? stopRec() : startRec();

async function startRec(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }catch(e){
    toast("마이크를 사용할 수 없어요 🎤");
    $('#hint').textContent = "브라우저에서 마이크 권한을 허용해 주세요.";
    return;
  }
  chunks = [];
  mediaRecorder = new MediaRecorder(stream);
  const curScript = $('#script').value.trim();
  const curMission = MISSIONS[mi];

  mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, {type:'audio/webm'});
    const url = URL.createObjectURL(blob);
    const dur = Math.round((Date.now()-startTime)/1000);
    takeNo++;
    const rec = {id:Date.now(), no:takeNo, url, blob, script:curScript, mission:curMission, dur, best:false};
    takes.unshift(rec);
    dbPut(rec);
    renderTakes();
    toast(praise());
  };

  mediaRecorder.start();
  startTime = Date.now();
  document.body.classList.add('live');
  $('#hint').textContent = "녹음 중… 다시 누르면 멈춰요";
  startTimer(); startWave();
}

function stopRec(){
  if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  stream && stream.getTracks().forEach(t=>t.stop());
  document.body.classList.remove('live');
  $('#hint').textContent = "버튼을 누르면 녹음이 시작돼요";
  stopTimer(); stopWave();
}

function startTimer(){
  const tick = () => {
    const s = Math.floor((Date.now()-startTime)/1000);
    $('#timer').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  };
  tick(); timerId = setInterval(tick,250);
}
function stopTimer(){ clearInterval(timerId); $('#timer').textContent = "0:00"; }

/* 실시간 파형 */
const canvas = $('#wave'), cctx = canvas.getContext('2d');
function startWave(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
  src.connect(analyser);
  const buf = new Uint8Array(analyser.frequencyBinCount);
  const draw = () => {
    rafId = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(buf);
    cctx.clearRect(0,0,canvas.width,canvas.height);
    cctx.lineWidth = 3; cctx.strokeStyle = '#ffc857';
    cctx.shadowColor = '#ffc857'; cctx.shadowBlur = 12;
    cctx.beginPath();
    const slice = canvas.width / buf.length;
    for(let i=0,x=0;i<buf.length;i++,x+=slice){
      const y = (buf[i]/128) * canvas.height/2;
      i===0 ? cctx.moveTo(x,y) : cctx.lineTo(x,y);
    }
    cctx.stroke();
  };
  draw();
}
function stopWave(){
  cancelAnimationFrame(rafId);
  cctx.clearRect(0,0,canvas.width,canvas.height);
  audioCtx && audioCtx.close();
}

/* 격려 멘트 */
function praise(){
  const p = ["멋진 연기였어! 👏","목소리에 감정이 살아있어 ✨","와, 진짜 성우 같아! 🌟",
    "한 번 더 들어볼까? 🎧","점점 좋아지고 있어! 💪","최고의 테이크였어 🏆"];
  return p[Math.floor(Math.random()*p.length)];
}

/* ---------- 테이크 목록 ---------- */
function renderTakes(){
  const list = $('#takeList');
  $('#takeCount').textContent = takes.length ? `· ${takes.length}개` : '';
  if(!takes.length){
    list.innerHTML = '<div class="empty">아직 녹음이 없어요.<br>위에서 첫 녹음을 시작해보세요! 🌟</div>';
    return;
  }
  list.innerHTML = '';
  takes.forEach(t=>{
    const row = document.createElement('div');
    row.className = 'take' + (t.best ? ' best' : '');
    const scriptPreview = t.script ? t.script.replace(/\n/g,' ').slice(0,40) + (t.script.length>40?'…':'') : '(대본 없음)';
    row.innerHTML = `
      <div class="no">Take ${t.no}</div>
      <div class="meta">
        <div class="top">${escapeHtml(scriptPreview)}</div>
        <div class="bot">🎭 ${escapeHtml(t.mission)} · ⏱ ${t.dur}초</div>
      </div>
      <audio controls src="${t.url}"></audio>
      <div class="take-actions">
        <button class="iconbtn star ${t.best?'on':''}" title="베스트 테이크">⭐</button>
        <button class="iconbtn dl" title="공유/내보내기">📤</button>
        <button class="iconbtn del" title="삭제">🗑️</button>
      </div>`;
    row.querySelector('.star').onclick = ()=>{ t.best=!t.best; dbPut(t); renderTakes(); };
    row.querySelector('.dl').onclick = ()=> shareTake(t);
    row.querySelector('.del').onclick = ()=>{
      const i=takes.indexOf(t); takes.splice(i,1); URL.revokeObjectURL(t.url); dbDelete(t.id); renderTakes();
    };
    list.appendChild(row);
  });
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* 녹음 공유/내보내기 (모바일) */
async function shareTake(t){
  const file = new File([t.blob], `MVS_Take${t.no}.webm`, {type:t.blob.type||'audio/webm'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:`MVS Take ${t.no}`}); return; }
    catch(e){ if(e.name==='AbortError') return; }
  }
  // 폴백: 다운로드
  const a=document.createElement('a'); a.href=t.url; a.download=file.name; a.click();
  toast("내보냈어요 📤");
}

/* 이름 저장 */
const nameEl = $('#nameEdit');
try{ const sn = localStorage.getItem('vs_name'); if(sn){ nameEl.value = sn; } }catch(e){}
function fitName(){ nameEl.style.width = Math.max(34,(nameEl.value.length+1)*13) + 'px'; }
fitName();
nameEl.addEventListener('input', e=>{
  fitName();
  try{ localStorage.setItem('vs_name', e.target.value); }catch(e){}
});

/* 시작 시 저장된 녹음 불러오기 */
loadTakes();

/* PWA 서비스워커 등록 */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
